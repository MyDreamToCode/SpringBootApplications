trigger:
  branches:
    include:
      - main
      - master
      - develop

pr:
  branches:
    include:
      - main

variables:
  imageName: studentregistration
  dockerfilePath: Dockerfile
  tag: $(Build.BuildId)
  imageRepository: myregistry.azurecr.io/$(imageName)
  # Set this to the name of your Azure DevOps service connection for the container registry
  containerRegistryServiceConnection: 'my-acr-service-connection'

stages:
- stage: BuildAndPush
  displayName: Build and push Docker image
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self

    # Build and push using Docker task. The `containerRegistry` input must point to a service connection
    - task: Docker@2
      displayName: Build and push image
      inputs:
        command: buildAndPush
        containerRegistry: '$(containerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        dockerfile: '$(dockerfilePath)'
        tags: |
          $(tag)

    - task: PublishPipelineArtifact@1
      displayName: Publish image metadata
      inputs:
        targetPath: |
          $(Pipeline.Workspace)
        artifact: image-metadata
        publishLocation: pipeline

