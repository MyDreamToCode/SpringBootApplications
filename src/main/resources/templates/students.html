<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Registered Students</h3>
                </div>
                <div class="card-body">
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th>Gender</th>
                            <th>Course</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="s,iterStat : ${students}">
                            <td th:text="${iterStat.index + 1}"></td>
                            <td th:text="${s.firstName} + ' ' + ${s.lastName}"></td>
                            <td th:text="${s.email}"></td>
                            <td th:text="${s.age}"></td>
                            <td th:text="${s.gender}"></td>
                            <td th:text="${s.course}"></td>
                        </tr>
                        <tr th:if="${students.size()} == 0">
                            <td colspan="6" class="text-center">No students registered yet.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer text-muted small text-end">
                    <a th:href="@{/register}" class="link-primary">Back to register</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
