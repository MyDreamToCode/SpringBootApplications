<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registration Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h2 class="text-success">Registration Successful!</h2>
                    <p class="lead">Thank you, <span th:text="${student.firstName}"></span> <span th:text="${student.lastName}"></span>. Your registration has been saved.</p>
                    <a th:href="@{/register}" class="btn btn-outline-primary">Register another student</a>
                    <a th:href="@{/students}" class="btn btn-primary ms-2">View all students</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
